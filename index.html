<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaLink | Supply Chain Manager</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Modern Pharmacy Supply Chain Management System">
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <span class="material-icons-round logo-icon">medication</span>
                <h1>PharmaLink</h1>
            </div>

            <nav class="nav-links">
                <button class="nav-btn active" data-view="dashboard">
                    <span class="material-icons-round">dashboard</span>
                    Dashboard
                </button>
                <button class="nav-btn" data-view="inventory">
                    <span class="material-icons-round">inventory_2</span>
                    Inventory
                </button>
                <button class="nav-btn" data-view="add-medicine">
                    <span class="material-icons-round">add_circle</span>
                    Add Medicine
                </button>
                <button class="nav-btn" data-view="serialize-unit">
                    <span class="material-icons-round">qr_code_2</span>
                    Serialize Unit
                </button>
                <button class="nav-btn" data-view="track">
                    <span class="material-icons-round">search</span>
                    Track / Search
                </button>
                <button class="nav-btn" data-view="verify-qr">
                    <span class="material-icons-round">verified</span>
                    Verify QR
                </button>
            </nav>

            <div class="user-profile">
                <div class="avatar">DA</div>
                <div class="user-info">
                    <p class="name">Admin User</p>
                    <p class="role">Pharmacy Manager</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 id="page-title">Dashboard</h2>
                <div class="actions">
                    <button id="connect-wallet-btn" class="connect-btn">
                        <span class="material-icons-round">account_balance_wallet</span>
                        <span>Connect Wallet</span>
                    </button>
                    <button class="icon-btn" aria-label="Notifications">
                        <span class="material-icons-round">notifications</span>
                        <span class="badge">3</span>
                    </button>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- views will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Ethers.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
